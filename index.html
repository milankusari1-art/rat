<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAT Executor UI</title>
    <style>
        body {
            background-color: #1c1c1c;
            color: #ffffff;
            font-family: Arial, sans-serif;
        }
        .sidebar {
            width: 200px;
            background-color: #2c2c2c;
            padding: 10px;
            display: inline-block;
            vertical-align: top;
        }
        .sidebar h2 {
            color: #00ff00;
        }
        .content {
            margin-left: 220px;
            padding: 10px;
        }
        .tab {
            display: none;
        }
        .tab.active {
            display: block;
        }
        button {
            background-color: #00ff00;
            border: none;
            color: black;
            padding: 10px 15px;
            cursor: pointer;
        }
        textarea {
            width: 100%;
            height: 200px;
            background-color: #1c1c1c;
            color: #ffffff;
            border: 1px solid #00ff00;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>RAT Executor</h2>
        <button onclick="showTab('executor')">Script Executor</button>
        <button onclick="showTab('library')">Script Library</button>
    </div>
    <div class="content">
        <div id="executor" class="tab active">
            <h3>Script Executor</h3>
            <textarea id="scriptEditor"></textarea>
            <button onclick="executeScript()">Execute</button>
        </div>
        <div id="library" class="tab">
            <h3>Script Library</h3>
            <ul id="scriptList">
                <!-- Script items will be generated here -->
            </ul>
            <button onclick="loadScript()">Load Selected Script</button>
        </div>
        <div id="consoleOutput">
            <h3>Console Output</h3>
            <pre id="outputArea"></pre>
        </div>
    </div>
    <button onclick="clearScript()">Clear Script</button>
    <button onclick="saveScript()">Save Script</button>

    <script>
        function showTab(tabName) {
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(tab => {
                tab.classList.remove('active');
            });
            document.getElementById(tabName).classList.add('active');
        }

        function executeScript() {
            const script = document.getElementById('scriptEditor').value;
            // Execute script logic here
            document.getElementById('outputArea').textContent += '\nExecuting: ' + script;
        }

        function loadScript() {
            // Logic to load a script from the library
            document.getElementById('outputArea').textContent += '\nLoaded script from library.';
        }

        function clearScript() {
            document.getElementById('scriptEditor').value = '';
            document.getElementById('outputArea').textContent = '';
        }

        function saveScript() {
            const script = document.getElementById('scriptEditor').value;
            // Logic to save the script
            document.getElementById('outputArea').textContent += '\nSaved script.';
        }
    </script>
</body>
</html>
